type: vertical-stack
cards:
  - type: glance
    title: "Stromzähler"
    show_name: true
    show_icon: true
    show_state: true
    entities:
      - entity: sensor.zahlerstand_aktuell
        name: "Zählerstand"
        icon: mdi:counter
      - entity: sensor.jahresverbrauch_bezug
        name: "Jahresverbrauch"
        icon: mdi:transmission-tower-import
      - entity: sensor.einspeisung_gesamt
        name: "Einspeisung"
        icon: mdi:transmission-tower-export

  - type: glance
    title: "Solar & Ersparnis"
    show_name: true
    show_icon: true
    show_state: true
    entities:
      - entity: sensor.solar_eigenverbrauch
        name: "Solar EV"
        icon: mdi:solar-power
      - entity: sensor.batterie_eigenverbrauch
        name: "Batterie EV"
        icon: mdi:battery-charging
      - entity: sensor.eingespart_gesamt
        name: "Eingespart"
        icon: mdi:piggy-bank

  - type: statistics-graph
    title: "Monatsverlauf"
    entities:
      - entity: sensor.jahresverbrauch_bezug
        name: "Bezug"
      - entity: sensor.einspeisung_gesamt
        name: "Einspeisung"
      - entity: sensor.eingespart_gesamt
        name: "Eingespart"
    period:
      calendar:
        period: month
    stat_types:
      - max
    chart_type: bar
