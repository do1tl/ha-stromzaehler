blueprint:
  name: "Virtueller Stromzähler (3-Phasen + Solar + Batterie)"
  description: >
    Vollständige Energiebilanz mit manuellem Zählerstand, 3-Phasen-Sensor,
    Solaranlage (z.B. Hoymiles) und optionalem Batteriespeicher (z.B. Victron).

    **Berechnete Sensoren nach Installation:**
    - Zählerstand aktuell (kWh)
    - Jahresverbrauch Bezug (vom Netz)
    - Jahreseinspeisung (ins Netz)
    - Solar Eigenverbrauch (selbst genutzter Solarstrom)
    - Eingespart gesamt (Solar + Batterie Eigenverbrauch)

    **Einmalige Einrichtung:**

    1. Zwei input_number Helper anlegen (Einstellungen → Helfer → Zahl):
       - Name: "Zählerstand Basis" | Entity-ID: input_number.stromzaehler_basis
         Min: 0 | Max: 999999 | Schrittweite: 1 | Einheit: kWh
       - Name: "Zählerstand Offset intern" | Entity-ID: input_number.stromzaehler_offset
         Min: 0 | Max: 9999999 | Schrittweite: 0.001 | Einheit: kWh

    2. Diesen Blueprint als Automation anlegen und alle Sensoren auswählen.

    3. Package-Datei aus dem GitHub-Repo in config/packages/ ablegen und
       die Sensor-IDs anpassen (siehe README).

    4. Aktuellen Zählerstand eintragen → fertig!

    **Jährlicher Reset:** Neuen Zählerstand eintragen, Offset wird automatisch gesetzt.

  domain: automation
  source_url: https://github.com/do1tl/ha-stromzaehler/blob/main/blueprints/stromzaehler.yaml

  input:
    sensor_phase_a:
      name: "Phase L1 – Energie-Sensor"
      description: "Energie-Sensor Phase L1 (kWh, device_class: energy). Bei Shelly 3EM z.B. sensor.shelly3em_channel_a_energy"
      selector:
        entity:
          domain: sensor
          device_class: energy

    sensor_phase_b:
      name: "Phase L2 – Energie-Sensor"
      description: "Energie-Sensor Phase L2 (kWh, device_class: energy)"
      selector:
        entity:
          domain: sensor
          device_class: energy

    sensor_phase_c:
      name: "Phase L3 – Energie-Sensor"
      description: "Energie-Sensor Phase L3 (kWh, device_class: energy)"
      selector:
        entity:
          domain: sensor
          device_class: energy

    sensor_solar:
      name: "Solar – Gesamtproduktion (z.B. Hoymiles)"
      description: "Kumulativer Energie-Sensor der Solaranlage in kWh. Bei Hoymiles z.B. sensor.hoymiles_total_production"
      selector:
        entity:
          domain: sensor
          device_class: energy

    sensor_batterie_laden:
      name: "Batterie – Lade-Energie (optional, z.B. Victron)"
      description: "Kumulativer Sensor für Energie die IN die Batterie geladen wurde (kWh). Leer lassen wenn nicht vorhanden."
      default: {}
      selector:
        entity:
          domain: sensor
          device_class: energy

    sensor_batterie_entladen:
      name: "Batterie – Entlade-Energie (optional, z.B. Victron)"
      description: "Kumulativer Sensor für Energie die AUS der Batterie entnommen wurde (kWh). Leer lassen wenn nicht vorhanden."
      default: {}
      selector:
        entity:
          domain: sensor
          device_class: energy

    helper_basis:
      name: "Helper: Zählerstand Basis (input_number)"
      description: "input_number in dem du deinen aktuellen Zählerstand einträgst (input_number.stromzaehler_basis)"
      selector:
        entity:
          domain: input_number

    helper_offset:
      name: "Helper: Zählerstand Offset intern (input_number)"
      description: "Zweiter input_number für den internen Referenzwert – wird automatisch gesetzt, nicht manuell ändern (input_number.stromzaehler_offset)"
      selector:
        entity:
          domain: input_number

# ── Automation ────────────────────────────────────────────────────────────────
alias: "Stromzähler – Offset aktualisieren"
description: "Speichert den aktuellen Phasenwert sobald ein neuer Zählerstand eingetragen wird."

trigger:
  - platform: state
    entity_id: !input helper_basis

action:
  - service: input_number.set_value
    target:
      entity_id: !input helper_offset
    data:
      value: >
        {% set a = states(!input sensor_phase_a) | float(0) %}
        {% set b = states(!input sensor_phase_b) | float(0) %}
        {% set c = states(!input sensor_phase_c) | float(0) %}
        {{ ([a, 0] | max + [b, 0] | max + [c, 0] | max) | round(3) }}

mode: single
