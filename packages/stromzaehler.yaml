# ─────────────────────────────────────────────────────────────────────────────
# Stromzähler Package – Template-Sensoren
# Ablegen unter: config/packages/stromzaehler.yaml
#
# Anpassen:
#   PHASE_A, PHASE_B, PHASE_C  → Entity-IDs deiner 3 Phasen-Sensoren (kWh)
#   SOLAR_PRODUKTION            → Entity-ID Hoymiles Gesamtproduktion (kWh)
#   BATTERIE_LADEN              → Entity-ID Victron Lade-Energie (kWh) – oder leer lassen
#   BATTERIE_ENTLADEN           → Entity-ID Victron Entlade-Energie (kWh) – oder leer lassen
#
# In configuration.yaml (falls noch nicht vorhanden):
#   homeassistant:
#     packages: !include_dir_named packages
# ─────────────────────────────────────────────────────────────────────────────

# ── Sensor-Konfiguration (hier anpassen!) ─────────────────────────────────────
# Trage hier deine echten Entity-IDs ein:
#   PHASE_A         z.B. sensor.shellyem3_channel_a_energy
#   PHASE_B         z.B. sensor.shellyem3_channel_b_energy
#   PHASE_C         z.B. sensor.shellyem3_channel_c_energy
#   SOLAR           z.B. sensor.hoymiles_hm_600_total_production
#   BATT_LADEN      z.B. sensor.victron_battery_charged_energy   (leer = 0)
#   BATT_ENTLADEN   z.B. sensor.victron_battery_discharged_energy (leer = 0)

template:
  - sensor:
      # ── Aktueller Zählerstand (Bezug vom Netz) ──────────────────────────────
      - name: "Zählerstand aktuell"
        unique_id: stromzaehler_aktuell
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:counter
        state: >
          {% set basis   = states('input_number.stromzaehler_basis') | float(0) %}
          {% set offset  = states('input_number.stromzaehler_offset') | float(0) %}
          {% set a = [states('sensor.PHASE_A') | float(0), 0] | max %}
          {% set b = [states('sensor.PHASE_B') | float(0), 0] | max %}
          {% set c = [states('sensor.PHASE_C') | float(0), 0] | max %}
          {{ [basis + (a + b + c) - offset, basis] | max | round(3) }}

      # ── Jahresverbrauch (Bezug seit letzter Eingabe) ─────────────────────────
      - name: "Jahresverbrauch Bezug"
        unique_id: stromzaehler_jahresverbrauch
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:transmission-tower-import
        state: >
          {% set offset = states('input_number.stromzaehler_offset') | float(0) %}
          {% set a = [states('sensor.PHASE_A') | float(0), 0] | max %}
          {% set b = [states('sensor.PHASE_B') | float(0), 0] | max %}
          {% set c = [states('sensor.PHASE_C') | float(0), 0] | max %}
          {{ [(a + b + c) - offset, 0] | max | round(3) }}

      # ── Einspeisung ins Netz ─────────────────────────────────────────────────
      # Negative Phasenwerte = Einspeisung (wird als positiver Wert angezeigt)
      - name: "Einspeisung gesamt"
        unique_id: stromzaehler_einspeisung
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:transmission-tower-export
        state: >
          {% set a = [states('sensor.PHASE_A') | float(0) * -1, 0] | max %}
          {% set b = [states('sensor.PHASE_B') | float(0) * -1, 0] | max %}
          {% set c = [states('sensor.PHASE_C') | float(0) * -1, 0] | max %}
          {{ (a + b + c) | round(3) }}

      # ── Solar Eigenverbrauch ─────────────────────────────────────────────────
      # Was Hoymiles produziert hat aber NICHT ins Netz eingespeist wurde
      - name: "Solar Eigenverbrauch"
        unique_id: stromzaehler_solar_eigenverbrauch
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:solar-power
        state: >
          {% set solar = states('sensor.SOLAR_PRODUKTION') | float(0) %}
          {% set ein_a = [states('sensor.PHASE_A') | float(0) * -1, 0] | max %}
          {% set ein_b = [states('sensor.PHASE_B') | float(0) * -1, 0] | max %}
          {% set ein_c = [states('sensor.PHASE_C') | float(0) * -1, 0] | max %}
          {% set einspeisung = ein_a + ein_b + ein_c %}
          {{ [solar - einspeisung, 0] | max | round(3) }}

      # ── Eingespart gesamt ────────────────────────────────────────────────────
      # Eigenverbrauch Solar + Batterie-Entladung = was du nicht kaufen musstest
      - name: "Eingespart gesamt"
        unique_id: stromzaehler_eingespart
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:piggy-bank
        state: >
          {% set solar = states('sensor.SOLAR_PRODUKTION') | float(0) %}
          {% set ein_a = [states('sensor.PHASE_A') | float(0) * -1, 0] | max %}
          {% set ein_b = [states('sensor.PHASE_B') | float(0) * -1, 0] | max %}
          {% set ein_c = [states('sensor.PHASE_C') | float(0) * -1, 0] | max %}
          {% set einspeisung = ein_a + ein_b + ein_c %}
          {% set eigenverbrauch = [solar - einspeisung, 0] | max %}
          {% set batt_entladen = states('sensor.BATTERIE_ENTLADEN') | float(0) %}
          {{ (eigenverbrauch + batt_entladen) | round(3) }}

      # ── Batterie Eigenverbrauch ──────────────────────────────────────────────
      # Netto Batterienutzung (Entladung - Ladung = was wirklich genutzt wurde)
      - name: "Batterie Eigenverbrauch"
        unique_id: stromzaehler_batterie_eigenverbrauch
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:battery-charging
        state: >
          {% set entladen = states('sensor.BATTERIE_ENTLADEN') | float(0) %}
          {% set laden    = states('sensor.BATTERIE_LADEN') | float(0) %}
          {{ [entladen - laden, 0] | max | round(3) }}
